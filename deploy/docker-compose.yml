# Ninmu Agent — Docker Compose configuration
#
# Start: docker compose -f deploy/docker-compose.yml up -d
# Logs:  docker compose -f deploy/docker-compose.yml logs -f
# Shell: docker compose -f deploy/docker-compose.yml exec ninmu bash

services:
  ninmu:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ninmu-agent
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ninmu-data:/workspace
      # Mount the current project into the agent
      - ${PWD}:/workspace/project
    working_dir: /workspace/project
    stdin_open: true
    tty: true
    networks:
      - ninmu

  # Optional: Sidecar for the JSON-RPC server
  ninmu-rpc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ninmu-rpc
    restart: unless-stopped
    ports:
      - "127.0.0.1:6688:6688"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ninmu-data:/workspace
      - ${PWD}:/workspace/project
    working_dir: /workspace/project
    entrypoint: ["ninmu"]
    command: ["rpc"]
    networks:
      - ninmu

volumes:
  ninmu-data:

networks:
  ninmu:
    driver: bridge
